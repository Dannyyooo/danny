<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黃金換算器</title>
    <style>
        :root {
            --gold-bg: linear-gradient(135deg, #f1c40f 0%, #d4af37 100%);
            --black: #000000;
            --black-soft: #1a1a1a;
            --up-red: #ff0000;
            --down-green: #008000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif;
            background-color: #000; 
            color: var(--black);
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .card {
            background: var(--gold-bg); 
            width: 100%; max-width: 380px;
            border-radius: 30px; padding: 45px 35px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            text-align: center;
            border: 4px solid #000;
            position: relative;
            /* 縮小成 80% */
            zoom: 0.8;
            -moz-transform: scale(0.8);
            -moz-transform-origin: center;
        }

        .header h1 { 
            font-size: 20px; font-weight: 900; color: var(--black); margin: 0; 
            letter-spacing: 2px; text-transform: uppercase;
        }
        .header p { 
            font-size: 12px; color: rgba(0,0,0,0.6); margin: 8px 0 25px; 
            font-weight: 900;
        }

        .price-box {
            background: rgba(0, 0, 0, 0.05); border-radius: 20px; padding: 30px 15px;
            border: 2px solid rgba(0, 0, 0, 0.1); margin-bottom: 25px;
        }

        .price-label { 
            font-size: 16px; color: var(--black-soft); margin-bottom: 10px; 
            font-weight: 900;
        }
        
        .price-val { 
            font-size: 56px; 
            font-weight: 900; 
            color: var(--black);
            line-height: 1;
            letter-spacing: -2px;
            margin: 5px 0;
            display: block;
        }

        .update-time { 
            font-size: 14px; color: rgba(0,0,0,0.7); margin-top: 15px; 
            font-weight: 900;
        }

        .change-info { 
            font-size: 24px; font-weight: 900; margin-top: 12px;
            min-height: 28px;
        }
        .up { color: var(--up-red) !important; text-shadow: 1px 1px 1px rgba(255,255,255,0.5); }
        .down { color: var(--down-green) !important; text-shadow: 1px 1px 1px rgba(255,255,255,0.5); }

        .input-area { margin-bottom: 35px; }
        .input-area label { 
            display: block; font-size: 16px; color: var(--black); 
            margin-bottom: 12px; font-weight: 900; text-transform: uppercase;
        }
        .input-wrap input {
            width: 100%; background: rgba(255,255,255,0.4); border: 3px solid #000; color: #000;
            padding: 15px; border-radius: 15px; font-size: 32px; 
            font-weight: 900; outline: none; box-sizing: border-box; text-align: center;
        }

        .total-box { padding-top: 30px; border-top: 2px solid rgba(0,0,0,0.1); }
        .total-label { 
            font-size: 16px; color: rgba(0,0,0,0.7); margin-bottom: 10px; 
            font-weight: 900;
        }
        .total-val { 
            font-size: 48px; font-weight: 900; color: var(--black); 
            letter-spacing: -1px;
        }

        .status { font-size: 13px; margin-top: 35px; color: var(--black-soft); font-weight: 900; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; border: 1px solid #000; }
        .online { background: #00ff88; }
        .syncing { background: #fff; animation: blink 1s infinite; }

        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        .btn {
            background: #000; border: none; color: #fff; padding: 15px;
            border-radius: 12px; font-size: 14px; cursor: pointer; margin-top: 25px; width: 100%;
            font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1>Gold Terminal</h1>
            <p>INSTITUTIONAL GRADE DATA</p>
        </div>

        <div class="price-box">
            <div class="price-label">今日「買進」金價</div>
            <div class="price-val" id="p-txt">0</div>
            <div class="update-time" id="u-time">最後同步: 載入中...</div>
            <div id="c-txt" class="change-info">--</div>
        </div>

        <div class="input-area">
            <label>持有黃金重量 (錢)</label>
            <div class="input-wrap">
                <input type="number" id="w-in" value="25.24" step="0.01" oninput="calc()">
            </div>
        </div>

        <div class="total-box">
            <div class="total-label">預估總價值 (台幣)</div>
            <div class="total-val" id="t-txt">NT$ 0</div>
        </div>

        <div id="s-bar" class="status">
            <span class="status-dot syncing"></span>正在抓取最新市場行情
        </div>

        <button class="btn" onclick="sync()">手動重新整理</button>
    </div>

    <script>
        let gP = 0;
        const G_URL = 'https://www.goldlegend.com/tw/price';

        function init() {
            const lp = localStorage.getItem('p');
            const lc = localStorage.getItem('c');
            const lt = localStorage.getItem('t');
            if (lp) {
                gP = parseFloat(lp);
                document.getElementById('p-txt').textContent = gP.toLocaleString();
                document.getElementById('c-txt').innerHTML = lc || '';
                document.getElementById('u-time').textContent = `最後同步: ${lt || '存檔資料'}`;
                calc();
            }
            sync();
        }

        async function sync() {
            const sb = document.getElementById('s-bar');
            sb.innerHTML = '<span class="status-dot syncing"></span>正在抓取最新市場行情';

            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(G_URL)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(G_URL)}`
            ];

            try {
                const fetchP = async (u) => {
                    const r = await fetch(u);
                    if (!r.ok) throw new Error();
                    const t = await r.text();
                    if (t.length < 500) throw new Error();
                    return t;
                };

                const h = await Promise.any(proxies.map(p => fetchP(p)));
                const ps = new DOMParser();
                const d = ps.parseFromString(h, 'text/html');

                let p = 0;
                const its = d.querySelectorAll('.summary-item');
                its.forEach(i => {
                    if (i.textContent.includes('今日買進')) {
                        const v = i.querySelector('.summary-value');
                        if (v) p = parseFloat(v.textContent.replace(/,/g, ''));
                    }
                });

                if (!p) {
                    const c = d.querySelector('#priceTable tbody tr td:nth-child(3)');
                    if (c) p = parseFloat(c.textContent.replace(/,/g, ''));
                }

                let ch = '';
                const cc = d.querySelector('#priceTable tbody tr td:nth-child(4)');
                if (cc) {
                    const t = cc.textContent.trim();
                    const cls = t.includes('▲') ? 'up' : (t.includes('▼') ? 'down' : '');
                    ch = `<span class="${cls}">${t}</span>`;
                }

                if (p > 0) {
                    gP = p;
                    const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                    document.getElementById('p-txt').textContent = gP.toLocaleString();
                    document.getElementById('c-txt').innerHTML = ch;
                    document.getElementById('u-time').textContent = `最後同步: ${now}`;
                    sb.innerHTML = '<span class="status-dot online"></span>市場數據同步成功';
                    localStorage.setItem('p', p);
                    localStorage.setItem('c', ch);
                    localStorage.setItem('t', now);
                    calc();
                }
            } catch (e) {
                sb.innerHTML = '<span class="status-dot" style="background:#555"></span>同步稍慢 (已顯示緩存)';
            }
        }

        function calc() {
            const w = parseFloat(document.getElementById('w-in').value) || 0;
            const t = Math.floor(gP * w);
            document.getElementById('t-txt').textContent = `NT$ ${t.toLocaleString()}`;
        }

        window.onload = init;
    </script>
</body>
</html>
